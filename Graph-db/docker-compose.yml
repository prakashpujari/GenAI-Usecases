services:
  neo4j:
    image: neo4j:5.26
    container_name: mortgage-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme123}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  api:
    build: .
    container_name: mortgage-api
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme123}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - DATA_PATH=${DATA_PATH:-./data/sample}
      - EXPORT_PATH=${EXPORT_PATH:-./exports}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs:
